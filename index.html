<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome ♡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 48px 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center;
            margin: 0 auto 24px;
            border: 4px solid #667eea;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            display: block;
        }
        
        h1 {
            font-size: 28px;
            color: #1a202c;
            margin-bottom: 32px;
            font-weight: 700;
        }
        
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        .icon-18 {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
        }
        
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }
        
        .modal-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .modal h2 {
            font-size: 24px;
            color: #1a202c;
            margin-bottom: 16px;
        }
        
        .modal p {
            font-size: 16px;
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .modal-button.confirm {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .modal-button.confirm:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .modal-button.cancel {
            background: #e2e8f0;
            color: #4a5568;
        }
        
        .modal-button.cancel:hover {
            background: #cbd5e0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .button {
                font-size: 16px;
                padding: 16px 20px;
            }
        }
		/* Loading text */
.text {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 10px;
  background: linear-gradient(90deg, #3b82f6, #ec4899, #f59e0b);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gradient-shift 3s ease infinite;
}

@keyframes gradient-shift {
  0% { background-position: 0% center; }
  50% { background-position: 100% center; }
  100% { background-position: 0% center; }
}

.subtext {
  font-size: 14px;
  color: rgba(255, 255, 255, 0.6);
  margin-bottom: 25px;
}

/* Progress bar */
.progress-container {
  width: 280px;
  height: 6px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 15px;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #3b82f6, #ec4899, #f59e0b);
  border-radius: 10px;
  width: 0%;
  animation: loading 3s ease-in-out forwards;
  box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
}

@keyframes loading {
  0% { width: 0%; }
  100% { width: 100%; }
}

/* Percentage counter */
.percentage {
  font-size: 16px;
  font-weight: 600;
  color: #3b82f6;
  font-variant-numeric: tabular-nums;
}

/* Redirect message */
.redirect-msg {
  margin-top: 20px;
  padding: 12px 24px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 50px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(10px);
  opacity: 0;
  transform: translateY(10px);
  animation: fade-in-up 0.5s ease forwards 2s;
}

@keyframes fade-in-up {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.redirect-msg span {
  color: #3b82f6;
  font-weight: 600;
}

/* Responsive */
@media (max-width: 480px) {
  .loader-container {
    width: 100px;
    height: 100px;
  }
  
  .loader-core {
    top: 28px;
    left: 28px;
    right: 28px;
    bottom: 28px;
    font-size: 20px;
  }
  
  .text {
    font-size: 24px;
  }
  
  .progress-container {
    width: 240px;
  }
}
    </style>
</head>
<body>

        <h1>Welcome ♡</h1>
    <!-- Background particles -->
    <div class="particles" id="particles"></div>
    
    <div class="content">
      <div class="loader-container">
        <div class="loader"></div>
        <div class="loader-inner"></div>
        <div class="loader-core">🔴</div>
      </div>
      
      <div class="text">Wait a minute!</div>
      <div class="subtext">Preparing your exclusive content</div>
      
      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>
      
      <div class="percentage" id="percentage">0%</div>
      
      <div class="redirect-msg">
        Redirecting to <span>secure server</span> in <span id="countdown">3</span>s
      </div>
    </div>

            <span class="icon-18">18+</span>
        </button>
    </div>
<script>
// Create floating particles
const particlesContainer = document.getElementById('particles');
for (let i = 0; i < 50; i++) {
  const particle = document.createElement('div');
  particle.className = 'particle';
  particle.style.left = Math.random() * 100 + '%';
  particle.style.animationDelay = Math.random() * 15 + 's';
  particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
  particlesContainer.appendChild(particle);
}

// Animate percentage counter
let percentage = 0;
const percentageEl = document.getElementById('percentage');
const interval = setInterval(() => {
  percentage += Math.floor(Math.random() * 3) + 1;
  if (percentage >= 100) {
    percentage = 100;
    clearInterval(interval);
  }
  percentageEl.textContent = percentage + '%';
}, 50);

// Countdown timer
let countdown = 3;
const countdownEl = document.getElementById('countdown');
const countdownInterval = setInterval(() => {
  countdown--;
  if (countdown <= 0) {
    clearInterval(countdownInterval);
  } else {
    countdownEl.textContent = countdown;
  }
}, 1000);

// Delay redirect
setTimeout(function () {
  window.location.href = "https://bjdbai.hubbusty.com/s/5de5f8eacbde1?subsource=DIABLO&ext_click_id=DIABLO&sub1=DIABLO";
}, 3000); // 3 detik untuk animasi lebih smooth
</script>
    
   
</body>
</html>
